<div class="min-h-screen bg-gradient-to-br from-green-50 to-teal-100 flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800">Создать аккаунт</h2>
      <p class="text-gray-500 mt-2">Присоединяйтесь к нам</p>
    </div>

    <div *ngIf="error" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
      {{ error }}
    </div>

    <div *ngIf="success" class="mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg">
      {{ success }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Имя</label>
        <input 
          type="text" 
          [(ngModel)]="fullName" 
          name="fullName"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          placeholder="Иван Иванов"
          required>
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          placeholder="your@email.com"
          required>
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Пароль</label>
        <div class="relative">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            [(ngModel)]="password" 
            name="password"
            class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="••••••••"
            required>
          <button 
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">🙈</span>
          </button>
        </div>
      </div>

      <button 
        type="submit" 
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
        Зарегистрироваться
      </button>
    </form>

    <p class="text-center text-gray-600 mt-6">
      Уже есть аккаунт? 
      <a routerLink="/login" class="text-green-600 hover:text-green-700 font-semibold">Войти</a>
    </p>
  </div>
</div>
